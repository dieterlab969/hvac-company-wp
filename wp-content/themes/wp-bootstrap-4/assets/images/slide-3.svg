<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="s3bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00a0e4"/>
      <stop offset="100%" stop-color="#005f8c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#s3bg)"/>
  <!-- Decorative circles -->
  <circle cx="1300" cy="160" r="220" fill="#ffffff" opacity=".08"/>
  <circle cx="1450" cy="540" r="120" fill="#ffffff" opacity=".08"/>
  <!-- Left side: Service icons grid -->
  <g transform="translate(120, 160)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="180" height="180" rx="22" fill="#ffffff"/>
    <circle cx="90" cy="70" r="28" fill="#e6f6fc"/>
    <path d="M76 70 L86 80 L104 60" stroke="#00a0e4" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="90" y="130" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">Khảo sát</text>
    <text x="90" y="150" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">miễn phí</text>
    <!-- Card 2 -->
    <rect x="200" y="0" width="180" height="180" rx="22" fill="#ffffff"/>
    <circle cx="290" cy="70" r="28" fill="#e6f6fc"/>
    <rect x="278" y="58" width="24" height="24" rx="3" fill="none" stroke="#00a0e4" stroke-width="3"/>
    <line x1="284" y1="66" x2="296" y2="66" stroke="#00a0e4" stroke-width="3"/>
    <line x1="284" y1="74" x2="296" y2="74" stroke="#00a0e4" stroke-width="3"/>
    <text x="290" y="130" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">Thiết kế</text>
    <text x="290" y="150" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">2D / 3D</text>
    <!-- Card 3 -->
    <rect x="0" y="200" width="180" height="180" rx="22" fill="#ffffff"/>
    <circle cx="90" cy="270" r="28" fill="#e6f6fc"/>
    <path d="M76 274 L86 264 L96 274 L96 282 L76 282 Z M82 282 L82 290 L90 290 L90 282" fill="none" stroke="#00a0e4" stroke-width="3" stroke-linejoin="round"/>
    <text x="90" y="330" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">Thi công</text>
    <text x="90" y="350" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">trọn gói</text>
    <!-- Card 4 -->
    <rect x="200" y="200" width="180" height="180" rx="22" fill="#ffffff"/>
    <circle cx="290" cy="270" r="28" fill="#e6f6fc"/>
    <path d="M278 270 a12 12 0 1 0 24 0 a12 12 0 1 0 -24 0 M290 258 v12 l8 6" stroke="#00a0e4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="290" y="330" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">Bảo trì</text>
    <text x="290" y="350" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#0f1d2e" text-anchor="middle">24/7</text>
  </g>
  <!-- Right side text -->
  <text x="640" y="240" font-family="Manrope,Arial" font-size="58" font-weight="800" fill="#ffffff">Dịch vụ HVAC trọn gói</text>
  <text x="640" y="310" font-family="Manrope,Arial" font-size="58" font-weight="800" fill="#ffffff">từ A đến Z</text>
  <text x="640" y="370" font-family="Inter,Arial" font-size="22" fill="#e8f6fc">Khảo sát · Thiết kế · Thi công · Bảo hành chính hãng</text>
  <!-- CTA pill -->
  <rect x="640" y="430" width="320" height="64" rx="32" fill="#ffffff"/>
  <text x="800" y="470" font-family="Manrope,Arial" font-size="20" font-weight="800" fill="#00a0e4" text-anchor="middle">Nhận báo giá miễn phí →</text>
</svg>

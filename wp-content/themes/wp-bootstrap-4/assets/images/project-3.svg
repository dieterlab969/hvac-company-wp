<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1f44"/>
      <stop offset="100%" stop-color="#0046aa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#p3)"/>
  <!-- Building tower -->
  <rect x="180" y="50" width="240" height="380" fill="#1a3568" stroke="#3a6dbf"/>
  <g fill="#7fb6ff" opacity=".85">
    <!-- Window grid -->
    <g>
      <rect x="200" y="70" width="50" height="40"/>
      <rect x="270" y="70" width="50" height="40"/>
      <rect x="340" y="70" width="50" height="40"/>
      <rect x="200" y="125" width="50" height="40"/>
      <rect x="270" y="125" width="50" height="40"/>
      <rect x="340" y="125" width="50" height="40"/>
      <rect x="200" y="180" width="50" height="40"/>
      <rect x="270" y="180" width="50" height="40"/>
      <rect x="340" y="180" width="50" height="40"/>
      <rect x="200" y="235" width="50" height="40"/>
      <rect x="270" y="235" width="50" height="40"/>
      <rect x="340" y="235" width="50" height="40"/>
      <rect x="200" y="290" width="50" height="40"/>
      <rect x="270" y="290" width="50" height="40"/>
      <rect x="340" y="290" width="50" height="40"/>
      <rect x="200" y="345" width="50" height="40"/>
      <rect x="270" y="345" width="50" height="40"/>
      <rect x="340" y="345" width="50" height="40"/>
    </g>
  </g>
  <!-- Lighted windows highlight -->
  <g fill="#ffd76a" opacity=".85">
    <rect x="270" y="125" width="50" height="40"/>
    <rect x="340" y="235" width="50" height="40"/>
    <rect x="200" y="290" width="50" height="40"/>
  </g>
  <!-- VRV outdoor units on rooftop -->
  <rect x="220" y="20" width="40" height="30" rx="3" fill="#fff" opacity=".9"/>
  <rect x="270" y="20" width="40" height="30" rx="3" fill="#fff" opacity=".9"/>
  <rect x="320" y="20" width="40" height="30" rx="3" fill="#fff" opacity=".9"/>
  <rect x="370" y="20" width="40" height="30" rx="3" fill="#fff" opacity=".9"/>
  <!-- Side buildings -->
  <rect x="40" y="200" width="120" height="230" fill="#0a1f44" stroke="#3a6dbf"/>
  <rect x="440" y="160" width="130" height="270" fill="#0a1f44" stroke="#3a6dbf"/>
  <g fill="#7fb6ff" opacity=".5">
    <rect x="60" y="220" width="20" height="20"/>
    <rect x="100" y="220" width="20" height="20"/>
    <rect x="60" y="260" width="20" height="20"/>
    <rect x="100" y="260" width="20" height="20"/>
    <rect x="60" y="300" width="20" height="20"/>
    <rect x="100" y="300" width="20" height="20"/>
    <rect x="60" y="340" width="20" height="20"/>
    <rect x="100" y="340" width="20" height="20"/>
    <rect x="460" y="180" width="20" height="20"/>
    <rect x="500" y="180" width="20" height="20"/>
    <rect x="540" y="180" width="20" height="20"/>
    <rect x="460" y="220" width="20" height="20"/>
    <rect x="500" y="220" width="20" height="20"/>
    <rect x="540" y="220" width="20" height="20"/>
    <rect x="460" y="260" width="20" height="20"/>
    <rect x="500" y="260" width="20" height="20"/>
    <rect x="540" y="260" width="20" height="20"/>
    <rect x="460" y="300" width="20" height="20"/>
    <rect x="500" y="300" width="20" height="20"/>
    <rect x="540" y="300" width="20" height="20"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="430" width="600" height="20" fill="#000d22"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="p4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102b56"/>
      <stop offset="100%" stop-color="#0046aa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#p4)"/>
  <!-- Floor -->
  <rect x="0" y="340" width="600" height="110" fill="#000d22"/>
  <!-- Chiller units row -->
  <g>
    <rect x="40" y="180" width="140" height="160" rx="10" fill="#1a3568" stroke="#3a6dbf"/>
    <rect x="60" y="200" width="100" height="30" rx="4" fill="#0a1f44"/>
    <text x="68" y="222" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#7fb6ff">CHILLER 01</text>
    <circle cx="80" cy="270" r="22" fill="#0a1f44" stroke="#7fb6ff"/>
    <circle cx="140" cy="270" r="22" fill="#0a1f44" stroke="#7fb6ff"/>
    <rect x="60" y="305" width="100" height="20" rx="3" fill="#0a1f44"/>
  </g>
  <g>
    <rect x="200" y="180" width="140" height="160" rx="10" fill="#1a3568" stroke="#3a6dbf"/>
    <rect x="220" y="200" width="100" height="30" rx="4" fill="#0a1f44"/>
    <text x="228" y="222" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#7fb6ff">CHILLER 02</text>
    <circle cx="240" cy="270" r="22" fill="#0a1f44" stroke="#7fb6ff"/>
    <circle cx="300" cy="270" r="22" fill="#0a1f44" stroke="#7fb6ff"/>
    <rect x="220" y="305" width="100" height="20" rx="3" fill="#0a1f44"/>
  </g>
  <g>
    <rect x="360" y="180" width="140" height="160" rx="10" fill="#1a3568" stroke="#3a6dbf"/>
    <rect x="380" y="200" width="100" height="30" rx="4" fill="#0a1f44"/>
    <text x="388" y="222" font-family="Manrope,Arial" font-size="14" font-weight="700" fill="#7fb6ff">BMS CTRL</text>
    <rect x="380" y="245" width="100" height="80" rx="4" fill="#0a1f44"/>
    <rect x="390" y="255" width="80" height="6" fill="#7fb6ff"/>
    <rect x="390" y="269" width="60" height="6" fill="#7fb6ff" opacity=".7"/>
    <rect x="390" y="283" width="70" height="6" fill="#7fb6ff" opacity=".7"/>
    <rect x="390" y="297" width="50" height="6" fill="#e60012"/>
    <rect x="390" y="311" width="80" height="6" fill="#7fb6ff" opacity=".5"/>
  </g>
  <!-- Pipes overhead -->
  <path d="M0 130 H 600" stroke="#3a6dbf" stroke-width="14" opacity=".7"/>
  <path d="M0 150 H 600" stroke="#7fb6ff" stroke-width="6" opacity=".7"/>
  <!-- Connections -->
  <line x1="110" y1="180" x2="110" y2="156" stroke="#3a6dbf" stroke-width="6"/>
  <line x1="270" y1="180" x2="270" y2="156" stroke="#3a6dbf" stroke-width="6"/>
  <line x1="430" y1="180" x2="430" y2="156" stroke="#3a6dbf" stroke-width="6"/>
  <!-- Indicator lights -->
  <circle cx="540" cy="60" r="6" fill="#34c0a0"/>
  <circle cx="560" cy="60" r="6" fill="#ffd76a"/>
  <circle cx="580" cy="60" r="6" fill="#e60012"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003e6b"/>
      <stop offset="55%" stop-color="#00729f"/>
      <stop offset="100%" stop-color="#00a0e4"/>
    </linearGradient>
    <linearGradient id="cb-ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbe7f5"/>
    </linearGradient>
    <radialGradient id="cb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="900" fill="url(#cb-bg)"/>
  <!-- Subtle grid -->
  <g opacity=".12" stroke="#ffffff">
    <path d="M0 150 H800 M0 300 H800 M0 450 H800 M0 600 H800 M0 750 H800" stroke-width="1"/>
    <path d="M150 0 V900 M300 0 V900 M450 0 V900 M600 0 V900 M750 0 V900" stroke-width="1"/>
  </g>
  <!-- Soft glow -->
  <ellipse cx="400" cy="320" rx="380" ry="240" fill="url(#cb-glow)"/>
  <!-- Wall mounted Daikin AC unit -->
  <g transform="translate(120, 220)">
    <rect x="0" y="0" width="560" height="170" rx="28" fill="url(#cb-ac)" stroke="#a9bedd" stroke-width="2"/>
    <rect x="20" y="22" width="520" height="120" rx="16" fill="#f4f9ff"/>
    <line x1="42" y1="50" x2="520" y2="50" stroke="#b6cfe6" stroke-width="2"/>
    <line x1="42" y1="74" x2="520" y2="74" stroke="#b6cfe6" stroke-width="2"/>
    <line x1="42" y1="98" x2="520" y2="98" stroke="#b6cfe6" stroke-width="2"/>
    <line x1="42" y1="122" x2="520" y2="122" stroke="#b6cfe6" stroke-width="2"/>
    <text x="450" y="18" font-family="Manrope,Arial" font-size="22" font-weight="800" fill="#00a0e4">DAIKIN</text>
    <circle cx="535" cy="68" r="5" fill="#00a0e4"/>
    <circle cx="535" cy="86" r="3" fill="#9bbed8"/>
    <!-- Bottom shadow -->
    <rect x="40" y="170" width="480" height="6" fill="#00000022"/>
  </g>
  <!-- Cool airflow lines -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".55">
    <path d="M180 410 q-10 60 -50 100"/>
    <path d="M260 415 q-10 70 -55 110"/>
    <path d="M340 410 q-10 65 -55 110"/>
    <path d="M420 415 q-10 70 -55 110"/>
    <path d="M500 410 q-10 60 -50 100"/>
    <path d="M580 415 q-10 65 -55 110"/>
  </g>
  <!-- Snowflakes -->
  <g fill="#ffffff" opacity=".7">
    <circle cx="180" cy="560" r="4"/>
    <circle cx="280" cy="600" r="3"/>
    <circle cx="380" cy="580" r="5"/>
    <circle cx="480" cy="610" r="3"/>
    <circle cx="580" cy="570" r="4"/>
    <circle cx="220" cy="660" r="3"/>
    <circle cx="430" cy="680" r="4"/>
    <circle cx="540" cy="700" r="3"/>
    <circle cx="320" cy="740" r="5"/>
    <circle cx="620" cy="760" r="3"/>
  </g>
</svg>

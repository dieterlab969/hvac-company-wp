      <rect x="80" y="240" width="30" height="30"/><rect x="120" y="240" width="30" height="30"/><rect x="160" y="240" width="30" height="30"/><rect x="200" y="240" width="30" height="30"/>
      <rect x="80" y="290" width="30" height="30"/><rect x="120" y="290" width="30" height="30"/><rect x="160" y="290" width="30" height="30"/><rect x="200" y="290" width="30" height="30"/>
      <rect x="80" y="340" width="30" height="30"/><rect x="120" y="340" width="30" height="30"/><rect x="160" y="340" width="30" height="30"/><rect x="200" y="340" width="30" height="30"/>
      <rect x="80" y="390" width="30" height="30"/><rect x="120" y="390" width="30" height="30"/><rect x="160" y="390" width="30" height="30"/><rect x="200" y="390" width="30" height="30"/>
      <rect x="280" y="80" width="35" height="35"/><rect x="330" y="80" width="35" height="35"/><rect x="380" y="80" width="35" height="35"/><rect x="430" y="80" width="35" height="35"/>
      <rect x="280" y="135" width="35" height="35"/><rect x="330" y="135" width="35" height="35"/><rect x="380" y="135" width="35" height="35"/><rect x="430" y="135" width="35" height="35"/>
      <rect x="280" y="190" width="35" height="35"/><rect x="330" y="190" width="35" height="35"/><rect x="380" y="190" width="35" height="35"/><rect x="430" y="190" width="35" height="35"/>

    <text x="1020" y="470" font-size="44" font-weight="800">2.500+</text>
    <text x="1020" y="500" font-size="14" fill="#a8d6ed">Công trình bàn giao</text>
    <text x="1220" y="470" font-size="44" font-weight="800">15+</text>
    <text x="1220" y="500" font-size="14" fill="#a8d6ed">Năm kinh nghiệm</text>
    <text x="1380" y="470" font-size="44" font-weight="800">24/7</text>
    <text x="1380" y="500" font-size="14" fill="#a8d6ed">Hỗ trợ kỹ thuật</text>

      <rect x="280" y="300" width="35" height="35"/><rect x="330" y="300" width="35" height="35"/><rect x="380" y="300" width="35" height="35"/><rect x="430" y="300" width="35" height="35"/>
      <rect x="520" y="200" width="30" height="30"/><rect x="560" y="200" width="30" height="30"/><rect x="600" y="200" width="30" height="30"/>

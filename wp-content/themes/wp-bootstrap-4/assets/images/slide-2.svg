  <!-- Right side text -->
  <text x="1020" y="240" font-family="Manrope,Arial" font-size="56" font-weight="800" fill="#ffffff">Thi công VRV/VRF</text>
  <text x="1020" y="310" font-family="Manrope,Arial" font-size="56" font-weight="800" fill="#ffffff">cho dự án lớn</text>

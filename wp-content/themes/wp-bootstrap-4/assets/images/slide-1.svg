<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="s1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003e6b"/>
      <stop offset="60%" stop-color="#00729f"/>
      <stop offset="100%" stop-color="#00a0e4"/>
    </linearGradient>
    <linearGradient id="s1ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbe7f5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#s1bg)"/>
  <g opacity=".18" stroke="#ffffff">
    <path d="M0 140 H1600 M0 280 H1600 M0 420 H1600 M0 560 H1600" stroke-width="1"/>
  </g>
  <!-- Floating circles -->
  <circle cx="200" cy="120" r="100" fill="#ffffff" opacity=".06"/>
  <circle cx="1400" cy="540" r="180" fill="#ffffff" opacity=".06"/>
  <!-- Living room scene -->
  <rect x="140" y="380" width="700" height="220" fill="#0a3d59" opacity=".5"/>
  <!-- Daikin AC unit (large, centered-left) -->
  <rect x="200" y="200" width="540" height="140" rx="22" fill="url(#s1ac)" stroke="#ffffff" opacity=".95"/>
  <rect x="220" y="220" width="500" height="100" rx="14" fill="#f4f9ff"/>
  <line x1="240" y1="248" x2="700" y2="248" stroke="#b6cfe6" stroke-width="2"/>
  <line x1="240" y1="270" x2="700" y2="270" stroke="#b6cfe6" stroke-width="2"/>
  <line x1="240" y1="292" x2="700" y2="292" stroke="#b6cfe6" stroke-width="2"/>
  <text x="640" y="200" font-family="Manrope,Arial" font-size="18" font-weight="800" fill="#00a0e4">DAIKIN</text>
  <circle cx="700" cy="232" r="4" fill="#00a0e4"/>
  <!-- Airflow -->
  <path d="M280 360 q-15 50 -50 80 M380 365 q-15 55 -50 85 M480 360 q-15 55 -50 85 M580 365 q-15 50 -50 80" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity=".7"/>
  <!-- Snowflakes -->
  <g fill="#ffffff" opacity=".7">
    <circle cx="900" cy="150" r="4"/>
    <circle cx="1000" cy="220" r="3"/>
    <circle cx="1100" cy="120" r="5"/>
    <circle cx="1200" cy="200" r="3"/>
    <circle cx="1300" cy="160" r="4"/>
  </g>
  <!-- Big text -->
  <text x="900" y="320" font-family="Manrope,Arial" font-size="64" font-weight="800" fill="#ffffff">Điều hòa Daikin</text>
  <text x="900" y="390" font-family="Manrope,Arial" font-size="64" font-weight="800" fill="#ffffff">chính hãng 100%</text>
  <text x="900" y="450" font-family="Inter,Arial" font-size="22" fill="#cdeaf8">Tiết kiệm điện · Vận hành êm · Bảo hành 5 năm</text>
  <!-- Badge -->
  <rect x="900" y="490" width="280" height="56" rx="28" fill="#ed1c24"/>
  <text x="930" y="525" font-family="Manrope,Arial" font-size="20" font-weight="700" fill="#ffffff">Đại lý ủy quyền Daikin</text>
</svg>
